<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Private Access</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  height: 100vh;
  background: radial-gradient(circle at top, #0b1b2b, #02060d);
  overflow: hidden;
  color: white;
}

/* Canvas background */
#bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
}

/* Center container */
.wrapper {
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  perspective: 1000px;
}

/* Card */
.card {
  width: 360px;
  padding: 30px;
  border-radius: 20px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  border: 1px solid rgba(255,255,255,0.1);
  box-shadow: 0 0 40px rgba(0,0,0,0.6);
  text-align: center;
  position: relative;
  z-index: 2;
  transition: transform 0.1s ease;
}

.badge {
  display: inline-block;
  padding: 5px 12px;
  font-size: 12px;
  border-radius: 999px;
  background: rgba(120,150,255,0.2);
  color: #9fb6ff;
  margin-bottom: 15px;
}

h1 {
  font-size: 28px;
  margin-bottom: 10px;
}

.desc {
  font-size: 14px;
  color: #aaa;
  margin-bottom: 25px;
}

.btn {
  width: 100%;
  padding: 15px;
  margin: 10px 0;
  border-radius: 12px;
  background: rgba(255,255,255,0.08);
  color: white;
  font-size: 15px;
  text-align: left;
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: 0.2s;
  text-decoration: none;
}

.btn:hover {
  background: rgba(255,255,255,0.15);
  transform: translateY(-2px);
}

.footer {
  margin-top: 20px;
  font-size: 11px;
  color: #666;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="wrapper">
  <div class="card" id="card">

    <div class="badge">● INVITE ONLY</div>

    <h1>Private Access</h1>
    <div class="desc">
      Secure gateway initialized. Select a destination to proceed.
    </div>

    <a class="btn" href="https://giftyoutube.pages.dev/" target="_blank">
      Gift Cards Here 🎁
    </a>

    <a class="btn" href="https://fortnite-frenzy.pages.dev/" target="_blank">
      Fortnite Epic Rewards 🎮
    </a>

    <a class="btn" href="https://1bloxtop.pages.dev/" target="_blank">
      R_O_B_U_X HERE 💠
    </a>

    <a class="btn" href="https://startbrainrot.pages.dev/" target="_blank">
      Steal a Brainrot 🔥
    </a>

    <a class="btn" href="https://99forest2026.pages.dev/" target="_blank">
      99 Nights Diamonds 💎
    </a>

    <div class="footer">
      🔒 Authorized Session • End-to-End Encrypted
    </div>

  </div>
</div>

<script>
// ⭐ STAR BACKGROUND
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

for (let i = 0; i < 120; i++) {
  stars.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    size: Math.random() * 2,
    speed: Math.random() * 0.5
  });
}

let mouse = { x: 0, y: 0 };

document.addEventListener("mousemove", e => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
});

function animateStars() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  stars.forEach(s => {
    let dx = (mouse.x - canvas.width / 2) * 0.0005;
    let dy = (mouse.y - canvas.height / 2) * 0.0005;

    s.x += dx + s.speed;
    s.y += dy + s.speed;

    if (s.x > canvas.width) s.x = 0;
    if (s.y > canvas.height) s.y = 0;

    ctx.fillStyle = "white";
    ctx.fillRect(s.x, s.y, s.size, s.size);
  });

  requestAnimationFrame(animateStars);
}

animateStars();

// 🧊 CARD PARALLAX
const card = document.getElementById("card");

document.addEventListener("mousemove", e => {
  let x = (window.innerWidth / 2 - e.clientX) / 25;
  let y = (window.innerHeight / 2 - e.clientY) / 25;

  card.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
});

// reset on leave
document.addEventListener("mouseleave", () => {
  card.style.transform = "rotateY(0deg) rotateX(0deg)";
});

// resize fix
window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>

</body>
</html>
