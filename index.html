<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Private Access</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      background: radial-gradient(circle at top, #0b1b2b, #02060d);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      color: white;
    }

    /* Stars */
    body::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: url("https://www.transparenttextures.com/patterns/stardust.png");
      opacity: 0.2;
    }

    .card {
      width: 360px;
      padding: 30px;
      border-radius: 20px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 0 40px rgba(0,0,0,0.6);
      text-align: center;
      position: relative;
    }

    .badge {
      display: inline-block;
      padding: 5px 12px;
      font-size: 12px;
      border-radius: 999px;
      background: rgba(120,150,255,0.2);
      color: #9fb6ff;
      margin-bottom: 15px;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    .desc {
      font-size: 14px;
      color: #aaa;
      margin-bottom: 25px;
    }

    .btn {
      width: 100%;
      padding: 15px;
      margin: 10px 0;
      border-radius: 12px;
      border: none;
      background: rgba(255,255,255,0.08);
      color: white;
      font-size: 15px;
      text-align: left;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: 0.2s;
    }

    .btn:hover {
      background: rgba(255,255,255,0.15);
      transform: translateY(-2px);
    }

    .icon {
      opacity: 0.8;
    }

    .footer {
      margin-top: 20px;
      font-size: 11px;
      color: #666;
    }
  </style>
</head>

<body>

  <div class="card">
    <div class="badge">● INVITE ONLY</div>

    <h1>Private Access</h1>
    <div class="desc">
      Secure gateway initialized. Select a destination to proceed.
    </div>

    <button class="btn">
      Gift Cards Here <span class="icon">🎁</span>
    </button>

    <button class="btn">
      Fortnite Epic Rewards <span class="icon">🎮</span>
    </button>

    <button class="btn">
      R_O_B_U_X HERE <span class="icon">💠</span>
    </button>

    <button class="btn">
      Steal a Brainrot <span class="icon">🔥</span>
    </button>

    <button class="btn">
      99 Nights Diamonds <span class="icon">💎</span>
    </button>

    <div class="footer">
      🔒 Authorized Session • End-to-End Encrypted
    </div>
  </div>

</body>
</html>
